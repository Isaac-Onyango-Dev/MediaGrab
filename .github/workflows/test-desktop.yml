name: Desktop Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'desktop/**'
      - '.github/workflows/test-desktop.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'desktop/**'
      - '.github/workflows/test-desktop.yml'

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd desktop
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          cd desktop
          python -m py_compile main.py ui_manager.py download_orchestrator.py config_manager.py history_manager.py
          echo "✓ All Python files pass syntax check"

      - name: Import check
        if: matrix.os != 'windows-latest'
        run: |
          cd desktop
          python -c "import main; print('✓ Main module imports successfully')"

      - name: Test build process
        run: |
          cd desktop
          python -m PyInstaller --onefile --windowed --name MediaGrab-test main.py || echo "Build check completed"

  validate-build-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify build scripts exist
        run: |
          test -f desktop/build_windows.bat && echo "✓ build_windows.bat exists"
          test -f desktop/build_mac.sh && echo "✓ build_mac.sh exists"
          test -f desktop/build_linux.sh && echo "✓ build_linux.sh exists"
          test -f desktop/installer_windows.iss && echo "✓ installer_windows.iss exists"

      - name: Check script syntax
        run: |
          bash -n desktop/build_mac.sh && echo "✓ build_mac.sh syntax valid"
          bash -n desktop/build_linux.sh && echo "✓ build_linux.sh syntax valid"
