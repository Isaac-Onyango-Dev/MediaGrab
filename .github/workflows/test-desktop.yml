name: Desktop Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'desktop/**'
      - '.github/workflows/test-desktop.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'desktop/**'
      - '.github/workflows/test-desktop.yml'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
        exclude:
          # Reduce matrix size for faster CI
          - os: macos-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.9'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('desktop/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install ffmpeg

    - name: Install system dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install ffmpeg inno-setup -y

    - name: Install Python dependencies
      run: |
        cd desktop
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Cache pytest
      uses: actions/cache@v3
      with:
        path: ~/.cache/pytest
        key: ${{ runner.os }}-pytest-${{ hashFiles('desktop/**') }}
        restore-keys: |
          ${{ runner.os }}-pytest-

    - name: Run linting
      run: |
        cd desktop
        python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        python -m flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Run type checking
      run: |
        cd desktop
        python -m mypy . --ignore-missing-imports || true

    - name: Run unit tests (headless)
      run: |
        cd desktop
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        fi
        python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: Run integration tests
      run: |
        cd desktop
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          export DISPLAY=:99
        fi
        python -m pytest tests/integration/ -v --tb=short || true

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: desktop/coverage.xml
        flags: desktop
        name: desktop-coverage-${{ matrix.python-version }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          desktop/htmlcov/
          desktop/test-results.xml
        retention-days: 7

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd desktop
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test build process
      run: |
        cd desktop
        python -m PyInstaller --onefile --windowed main.py || true

    - name: Test packaging
      run: |
        cd desktop
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          bash build_linux.sh || true
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          bash build_mac.sh || true
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          call build_windows.bat || true
        fi
      shell: bash
