name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        working-directory: desktop
        run: pip install -r requirements.txt

      - name: Build Windows exe
        working-directory: desktop
        run: .\build_windows.bat

      - name: Stage installer files
        working-directory: desktop
        shell: bash
        run: |
          mkdir -p dist/installer_staging
          if [ -f "dist/MediaGrab.exe" ]; then cp dist/MediaGrab.exe dist/installer_staging/; fi
          if [ -d "assets" ]; then cp -r assets dist/installer_staging/; fi
          ls -la dist/installer_staging/ || echo "Staging directory contents above"

      - name: Extract version for use
        id: version
        shell: bash
        working-directory: desktop
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Compile Inno Setup Installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "iscc" }
          & $iscc installer_windows.iss /O+ /DMyAppVersion=${{ steps.version.outputs.version }}
        working-directory: desktop
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-Windows
          path: desktop/dist/MediaGrab-*-Setup.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies & create-dmg
        run: |
          brew install create-dmg
          pip install -r desktop/requirements.txt

      - name: Build macOS app
        working-directory: desktop
        run: bash ./build_mac.sh

      - name: Rename macOS DMG to standard name
        working-directory: desktop
        run: |
          if ls dist/MediaGrab-*.dmg 1> /dev/null 2>&1; then
            for f in dist/MediaGrab-*.dmg; do
              if [ -f "$f" ]; then
                mv "$f" dist/MediaGrab-macOS.dmg
                echo "Renamed $f to dist/MediaGrab-macOS.dmg"
                break
              fi
            done
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-macOS
          path: desktop/dist/MediaGrab-macOS.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libfuse2

      - name: Install PyInstaller
        run: |
          pip install -r desktop/requirements.txt

      - name: Build Linux executable
        working-directory: desktop
        run: bash ./build_linux.sh

      - name: Create .tar.gz archive
        working-directory: desktop
        run: |
          mkdir -p dist/archive
          cp dist/MediaGrab dist/archive/
          if [ -d "assets" ]; then cp -r assets dist/archive/; fi
          cd dist
          tar -czf MediaGrab-linux-x86_64.tar.gz -C archive .

      - name: Download AppImageTool
        run: |
          wget -O $GITHUB_WORKSPACE/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x $GITHUB_WORKSPACE/appimagetool

      - name: Create AppImage
        working-directory: desktop
        run: |
          mkdir -p AppDir/usr/{bin,share/icons/hicolor/256x256/apps}
          if [ -f "dist/MediaGrab" ]; then
            cp dist/MediaGrab AppDir/usr/bin/MediaGrab
          else
            echo "ERROR: MediaGrab binary not found in dist/"
            ls -la dist/ || true
            exit 1
          fi
          if [ -f "MediaGrab.desktop" ]; then cp MediaGrab.desktop AppDir/MediaGrab.desktop; fi
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png AppDir/MediaGrab.png
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/MediaGrab.png
          fi
          chmod +x AppDir/usr/bin/MediaGrab
          export ARCH=x86_64
          VERSION="${{ github.ref_type == 'tag' && github.ref_name || '1.0.0' }}"
          $GITHUB_WORKSPACE/appimagetool AppDir "dist/MediaGrab-${VERSION}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-Linux-AppImage
          path: desktop/dist/MediaGrab-*-x86_64.AppImage

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-Linux-tarball
          path: desktop/dist/MediaGrab-linux-x86_64.tar.gz

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: npm install --legacy-peer-deps


      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Create Temporary Assets
        run: |
          mkdir -p assets
          touch assets/icon.png
          touch assets/adaptive-icon.png
          touch assets/splash.png

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/MediaGrab-Android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-Android
          path: mobile/dist/MediaGrab-Android.apk

  build-backend-docker:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:latest
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux, build-android, build-backend-docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug - show artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts/ -type f || echo "No artifacts found"

      - name: Organize artifacts
        run: |
          mkdir -p release_assets
          
          # Windows
          if ls artifacts/MediaGrab-Windows/MediaGrab-*-Setup.exe 1> /dev/null 2>&1; then
            cp artifacts/MediaGrab-Windows/MediaGrab-*-Setup.exe release_assets/
            echo "✓ Windows installer found"
          else
            echo "⚠ Windows installer NOT found"
            ls -la artifacts/ || true
          fi
          
          # macOS
          if ls artifacts/MediaGrab-macOS/MediaGrab-macOS.dmg 1> /dev/null 2>&1; then
            cp artifacts/MediaGrab-macOS/MediaGrab-macOS.dmg release_assets/
            echo "✓ macOS DMG found"
          else
            echo "⚠ macOS DMG NOT found"
          fi
          
          # Linux AppImage
          if ls artifacts/MediaGrab-Linux-AppImage/MediaGrab-*-x86_64.AppImage 1> /dev/null 2>&1; then
            cp artifacts/MediaGrab-Linux-AppImage/MediaGrab-*-x86_64.AppImage release_assets/
            echo "✓ Linux AppImage found"
          else
            echo "⚠ Linux AppImage NOT found"
          fi
          
          # Linux tar.gz
          if [ -f "artifacts/MediaGrab-Linux-tarball/MediaGrab-linux-x86_64.tar.gz" ]; then
            cp artifacts/MediaGrab-Linux-tarball/MediaGrab-linux-x86_64.tar.gz release_assets/
            echo "✓ Linux tar.gz found"
          else
            echo "⚠ Linux tar.gz NOT found"
          fi
          
          # Android
          if [ -f "artifacts/MediaGrab-Android/MediaGrab-Android.apk" ]; then
            cp artifacts/MediaGrab-Android/MediaGrab-Android.apk release_assets/
            echo "✓ Android APK found"
          else
            echo "⚠ Android APK NOT found"
          fi
          
          echo "Final release assets:"
          ls -lh release_assets/ || echo "No assets!"

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MediaGrab v${{ steps.version.outputs.version }}
          body: |
            ## MediaGrab v${{ steps.version.outputs.version }}

            ### Installers

            **Windows:** Run the `.exe` installer for a guided setup with Start Menu and optional desktop shortcut.
            **macOS:** Open the `.dmg` and drag MediaGrab to your Applications folder.
            **Linux (AppImage):** Make the `.AppImage` executable (`chmod +x`) and run it directly.
            **Linux (tar.gz):** Extract the archive and run the `MediaGrab` binary.
            **Android:** Install the `.apk` file (enable "Install from unknown sources" if needed).

            ### Installation Instructions

            #### Windows
            1. Download `MediaGrab-<version>-Setup.exe`
            2. Double-click to run the installer
            3. Follow the installation wizard
            4. Launch from Start Menu or desktop shortcut

            #### macOS
            1. Download `MediaGrab-macOS.dmg`
            2. Double-click to open the disk image
            3. Drag MediaGrab to the Applications folder
            4. Right-click and select "Open" on first launch (to bypass Gatekeeper)

            #### Linux (AppImage)
            1. Download `MediaGrab-<version>-x86_64.AppImage`
            2. Make it executable: `chmod +x MediaGrab-*.AppImage`
            3. Run: `./MediaGrab-*.AppImage`

            #### Linux (tar.gz)
            1. Download `MediaGrab-linux-x86_64.tar.gz`
            2. Extract: `tar -xzf MediaGrab-linux-x86_64.tar.gz`
            3. Run: `./MediaGrab`

            #### Android
            1. Download `MediaGrab-Android.apk`
            2. Enable "Install from unknown sources" in Settings
            3. Open the APK to install
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release_assets/*.exe
            release_assets/*.dmg
            release_assets/*.AppImage
            release_assets/*.tar.gz
            release_assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
