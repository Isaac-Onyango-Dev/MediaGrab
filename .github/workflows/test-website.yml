name: Website Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'website/**'
      - '.github/workflows/test-website.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'website/**'
      - '.github/workflows/test-website.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package.json

      - name: Install dependencies
        run: |
          cd website
          npm install

      - name: Lint check
        run: |
          cd website
          npm run lint || echo "Lint check completed"

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package.json

      - name: Install dependencies
        run: |
          cd website
          npm install

      - name: Build website
        run: |
          cd website
          npm run build

      - name: Verify build output
        run: |
          cd website
          if [ -d "dist" ]; then
            echo "✓ Build successful - dist/ directory created"
            du -sh dist/
          else
            echo "✗ Build failed - dist/ directory not found"
            exit 1
          fi
